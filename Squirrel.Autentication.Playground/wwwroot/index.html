<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <script src="//unpkg.com/alpinejs" defer></script>
    <script src="wwwroot/scripts/squirrel-playgroud-app.js"></script>
</head>
<body>
    <div x-data="$model">
        <section id="secretKeyField" x-data="{ text: secretKey }">
            <strong>Chave Secreta: </strong><span x-text="text"></span>

        <section id="qrCodeField" x-data="{ src: qrCode }">
            <strong>QRCode: </strong><img :src="src" alt="QR Code" />
        </section>
    </div>
</body>
</html>
